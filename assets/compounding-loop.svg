<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="380" viewBox="0 0 1280 380" role="img" aria-labelledby="title desc">
  <title id="title">PinkBrain LP compounding loop</title>
  <desc id="desc">A diagram showing the Bags fee claim, swap, liquidity, lock, and distribution loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#05070d" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f472b6" />
    </marker>
  </defs>
  <rect width="1280" height="380" rx="28" fill="url(#bg)" />
  <text x="72" y="68" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">PinkBrain LP Compounding Loop</text>
  <text x="72" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="17">Claim Bags fees, turn them into locked liquidity, then keep compounding the resulting fee stream.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="150" width="190" height="110" rx="22" fill="#111827" stroke="#f472b6" stroke-width="2" />
    <text x="98" y="188" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">1. Claim Fees</text>
    <text x="98" y="214" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Monitor claimable Bags</text>
    <text x="98" y="234" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">positions until the operator</text>
    <text x="98" y="254" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">threshold is reached.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="308" y="150" width="190" height="110" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
    <text x="334" y="188" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">2. Swap Tokens</text>
    <text x="334" y="214" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Swap through the Bags</text>
    <text x="334" y="234" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">trade API into the selected</text>
    <text x="334" y="254" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">token pair.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="544" y="150" width="190" height="110" rx="22" fill="#111827" stroke="#34d399" stroke-width="2" />
    <text x="570" y="188" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">3. Add Liquidity</text>
    <text x="570" y="214" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Deposit both assets into</text>
    <text x="570" y="234" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">the target Meteora DAMM</text>
    <text x="570" y="254" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">v2 pool.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="780" y="150" width="190" height="110" rx="22" fill="#111827" stroke="#f59e0b" stroke-width="2" />
    <text x="806" y="188" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">4. Permanent Lock</text>
    <text x="806" y="214" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Lock the position so it</text>
    <text x="806" y="234" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">keeps earning but cannot</text>
    <text x="806" y="254" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">be withdrawn.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1016" y="150" width="190" height="110" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" />
    <text x="1042" y="188" fill="#ddd6fe" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">5. Distribute Fees</text>
    <text x="1042" y="214" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Route LP fees to the owner</text>
    <text x="1042" y="234" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">or top holders, then feed</text>
    <text x="1042" y="254" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">the next compound cycle.</text>
  </g>

  <path d="M262 205 H308" stroke="#f472b6" stroke-width="5" fill="none" marker-end="url(#arrow)" />
  <path d="M498 205 H544" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)" />
  <path d="M734 205 H780" stroke="#34d399" stroke-width="5" fill="none" marker-end="url(#arrow)" />
  <path d="M970 205 H1016" stroke="#f59e0b" stroke-width="5" fill="none" marker-end="url(#arrow)" />
  <path d="M1111 284 C1111 332, 214 332, 214 282" stroke="#f472b6" stroke-width="4" stroke-dasharray="10 10" fill="none" marker-end="url(#arrow)" />
  <text x="532" y="348" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="14">Claimed value becomes deeper liquidity, which keeps producing the next fee stream.</text>
</svg>
