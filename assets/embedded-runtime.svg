<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">PinkBrain LP embedded runtime</title>
  <desc id="desc">A diagram showing the Bags parent iframe, embedded frontend, backend, remote signer, and external services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="100%" stop-color="#04070d" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38bdf8" />
    </marker>
  </defs>
  <rect width="1280" height="520" rx="28" fill="url(#bg)" />
  <text x="72" y="68" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Embedded Bags App Store Runtime</text>
  <text x="72" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="17">Wallet context may arrive from Bags, but operator auth, orchestration, and signer custody stay within PinkBrain LP boundaries.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="150" width="520" height="250" rx="28" fill="#0f172a" stroke="#f472b6" stroke-width="2" />
    <text x="104" y="188" fill="#fbcfe8" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Bags App Store Page</text>
    <rect x="118" y="224" width="428" height="128" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
    <text x="148" y="258" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">PinkBrain LP Embedded Frontend</text>
    <text x="148" y="286" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">React control plane rendered in an iframe</text>
    <text x="148" y="308" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Bootstrap-token exchange -> HttpOnly session cookie</text>
    <text x="148" y="330" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Optional Bags wallet context via injected bridge or origin-scoped postMessage</text>
    <text x="148" y="382" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="13">Embedding should remain limited to Bags-controlled origins.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="664" y="150" width="244" height="118" rx="24" fill="#111827" stroke="#34d399" stroke-width="2" />
    <text x="694" y="188" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">PinkBrain Backend</text>
    <text x="694" y="216" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Fastify API, scheduler, validation,</text>
    <text x="694" y="238" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">run orchestration, audit logging</text>

    <rect x="664" y="302" width="244" height="98" rx="24" fill="#111827" stroke="#f59e0b" stroke-width="2" />
    <text x="694" y="338" fill="#fde68a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Remote Signer</text>
    <text x="694" y="366" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Authenticated /sign-and-send</text>
    <text x="694" y="388" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Long-lived key isolated from UI</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="972" y="126" width="228" height="88" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="2" />
    <text x="1002" y="160" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Bags.fm API</text>
    <text x="1002" y="186" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Claims, quotes, trade flows</text>

    <rect x="972" y="228" width="228" height="88" rx="22" fill="#111827" stroke="#22d3ee" stroke-width="2" />
    <text x="1002" y="262" fill="#a5f3fc" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Meteora DAMM v2</text>
    <text x="1002" y="288" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Pools, liquidity, lock actions</text>

    <rect x="972" y="330" width="228" height="88" rx="22" fill="#111827" stroke="#a78bfa" stroke-width="2" />
    <text x="1002" y="364" fill="#ddd6fe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Helius + Solana</text>
    <text x="1002" y="390" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="14">Priority fees, DAS, confirmations</text>
  </g>

  <path d="M546 288 H664" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrow)" />
  <path d="M786 268 V302" stroke="#34d399" stroke-width="5" fill="none" marker-end="url(#arrow)" />
  <path d="M908 188 H972" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M908 272 H972" stroke="#22d3ee" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <path d="M908 352 H972" stroke="#a78bfa" stroke-width="4" fill="none" marker-end="url(#arrow)" />

  <text x="570" y="270" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="13">trusted-origin requests</text>
  <text x="808" y="292" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="13">narrow signer boundary</text>
</svg>
